name: Release

on:
  workflow_run:
    workflows:
      - Test
    types:
      - completed
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Action | Checkout Repository Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup | Configure Node.js
        uses: actions/setup-node@v6
        with:
          cache: "npm"
          node-version: "25"

      - name: Setup | Force Release Branch to be at Workflow SHA
        run: git reset --hard ${{ github.sha }}

      - name: Evaluate | Verify Upstream has NOT Changed
        shell: bash
        run: |
          set +o pipefail

          UPSTREAM_BRANCH_NAME="$(git status -sb | head -n 1 | awk -F '\\.\\.\\.' '{print $2}' | cut -d ' ' -f1)"
          printf '%s\n' "Upstream branch name: $UPSTREAM_BRANCH_NAME"

          set -o pipefail

          if [ -z "$UPSTREAM_BRANCH_NAME" ]; then
              printf >&2 '%s\n' "::error::Unable to determine upstream branch name!"
              exit 1
          fi

          git fetch "${UPSTREAM_BRANCH_NAME%%/*}"

          if ! UPSTREAM_SHA="$(git rev-parse "$UPSTREAM_BRANCH_NAME")"; then
              printf >&2 '%s\n' "::error::Unable to determine upstream branch sha!"
              exit 1
          fi

          HEAD_SHA="$(git rev-parse HEAD)"

          if [ "$HEAD_SHA" != "$UPSTREAM_SHA" ]; then
              printf >&2 '%s\n' "[HEAD SHA] $HEAD_SHA != $UPSTREAM_SHA [UPSTREAM SHA]"
              printf >&2 '%s\n' "::error::Upstream has changed, aborting release..."
              exit 1
          fi

          printf '%s\n' "Verified upstream branch has not changed, continuing with release..."

      - name: Setup | Configure Git Authentication for Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Setup | Install Dependencies
        run: npm ci

      - name: Setup | Build Project
        run: npm run build

      - name: Evaluate | Snapshot Tags before Release
        id: snapshot_tags
        shell: bash
        run: |
          set -euo pipefail

          TAGS_FILE="$RUNNER_TEMP/release-tags-before.txt"
          git fetch --tags --force origin
          git tag --list | LC_ALL=C sort > "$TAGS_FILE"

          printf 'tags_file=%s\n' "$TAGS_FILE" >> "$GITHUB_OUTPUT"

      - name: Action | Create Release
        id: create_release
        run: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup | Delete Release Tag after Failed Release
        if: ${{ failure() && steps.create_release.outcome == 'failure' }}
        shell: bash
        run: |
          set -euo pipefail

          BEFORE_TAGS_FILE='${{ steps.snapshot_tags.outputs.tags_file }}'
          AFTER_TAGS_FILE="$RUNNER_TEMP/release-tags-after.txt"

          if [ -z "$BEFORE_TAGS_FILE" ] || [ ! -f "$BEFORE_TAGS_FILE" ]; then
            printf '%s\n' 'No baseline tag snapshot found. Skipping tag cleanup.'
            exit 0
          fi

          git fetch --tags --force origin
          git tag --list | LC_ALL=C sort > "$AFTER_TAGS_FILE"

          NEW_TAGS="$(comm -13 "$BEFORE_TAGS_FILE" "$AFTER_TAGS_FILE")"

          if [ -z "$NEW_TAGS" ]; then
            printf '%s\n' 'No new tags were created during this run. Skipping tag cleanup.'
            exit 0
          fi

          while IFS= read -r tag; do
            if [ -z "$tag" ]; then
              continue
            fi

            printf 'Deleting tag created during failed release: %s\n' "$tag"
            git tag -d "$tag" >/dev/null 2>&1 || true
            git push origin ":refs/tags/$tag"
          done <<< "$NEW_TAGS"
