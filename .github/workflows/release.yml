name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: semantic-release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js 25
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Verify release tokens are configured
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
        run: |
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "Missing GITHUB_TOKEN secret. Configure a PAT or GitHub App token that can push tags and satisfies repository rules." >&2
            exit 1
          fi

          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "Missing NPM_ACCESS_TOKEN secret." >&2
            exit 1
          fi

      - name: Configure git authentication for release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: npm ci

      - name: Verify package
        run: npm run test:coverage -- --ci --runInBand --verbose && npm run build

      - name: Create release with semantic-release
        run: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
