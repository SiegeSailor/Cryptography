name: Test

on:
  push:
    paths:
      - ".github/workflows/**"
      - ".npmrc"
      - ".releaserc.json"
      - "jest.config.ts"
      - "package-lock.json"
      - "package.json"
      - "README.md"
      - "scripts/**"
      - "source/**"
      - "tsconfig.json"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - "14.18.0"
          - "16.20.2"
          - "18.0.0"
          - "25.2.1"
    steps:
      - name: Action | Checkout Repository Code
        uses: actions/checkout@v6

      - name: Setup | Configure Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Setup | Install Dependencies
        run: npm ci

      - name: Evaluate | Run Compatibility Suite
        run: npm run test:compatibility

      - name: Evaluate | Run Coverage Suite
        if: ${{ matrix.node-version == '25.2.1' }}
        run: npm run test:coverage -- --ci --runInBand --verbose
